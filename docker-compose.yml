version: '3.8'

services:
  # 1. Database Service (MySQL)
  db:
    image: mysql:8.0
    container_name: bike_tour_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: bike321  # Password root database
      MYSQL_DATABASE: bike_tour_db        # Nama database otomatis dibuat
      MYSQL_USER: wp_user                 # User khusus untuk WP
      MYSQL_PASSWORD: wp_password         # Password user WP
    volumes:
      - db_data:/var/lib/mysql            # Persist data database biar gak hilang pas restart
    # Command ini penting buat MySQL 8.0 supaya kompatibel sama client PHP lama/standar
    command: '--default-authentication-plugin=mysql_native_password'
    #platform: linux/x86_64 # Opsional: Kadang MySQL 8 lebih stabil di M2 pake ini, tapi coba tanpa ini dulu (native) juga oke.

  # 2. WordPress Service
  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: bike_tour_wp
    restart: always
    ports:
      - "8000:80"                         # Akses di browser: localhost:8000
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: bike_tour_db
    volumes:
      - wp_data:/var/www/html             # Persist core WP & plugin
      - ./wp-content:/var/www/html/wp-content  # <--- Pastikan akhiran 'content' lengkap
      # Nanti kalau mau ngoding theme, uncomment baris di bawah ini:
      # - ./wp-content/themes:/var/www/html/wp-content/themes

  # 3. phpMyAdmin Service (Database Management)
  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin/phpmyadmin
    container_name: bike_tour_pma
    restart: always
    ports:
      - "8083:80"                         # Akses di browser: localhost:8080
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: bike321

volumes:
  db_data:
  wp_data:
